<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Digital Communication & Messaging System</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Digital Communication & Messaging System</h1>
    <section>
      <h2>Account</h2>
      <input id="username" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />
      <div class="row">
        <button onclick="registerUser()">Register</button>
        <button onclick="loginUser()">Login</button>
        <button onclick="logoutUser()">Logout</button>
      </div>
    </section>

    <section>
      <h2>Message</h2>
      <input id="receiver" placeholder="Receiver username" />
      <textarea id="content" placeholder="Write your message"></textarea>
      <button onclick="sendMessage()">Send Message</button>
    </section>

    <section>
      <h2>Chat History</h2>
      <input id="historyUser" placeholder="Other user" />
      <button onclick="loadHistory()">Load History</button>
      <ul id="history"></ul>
    </section>

    <p id="status"></p>
  </main>
  <script src="/app.js"></script>
</body>
</html>
